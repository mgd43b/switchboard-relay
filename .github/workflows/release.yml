name: Release

# release-please watches conventional commits on main and maintains a release
# PR that bumps the version + CHANGELOG. Merging that PR creates the tag and
# GitHub Release; the publish job then builds and pushes to PyPI.
on:
  push:
    branches: [main]

permissions: {}

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ github.token }}

  publish:
    name: Publish to PyPI (Trusted Publishing / OIDC)
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/switchboard-relay
    permissions:
      id-token: write # MANDATORY for OIDC trusted publishing; no API tokens.
      contents: write # to attach built dists to the GitHub Release
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13" # pin the build interpreter for reproducible releases

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Attach built dists to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release upload "${{ needs.release-please.outputs.tag_name }}"
          dist/* --repo "${{ github.repository }}"
    # Homebrew: after a release, run `scripts/update-tap.sh <version>` on macOS.
    # It bumps the formula AND regenerates the pinned Python resource stanzas
    # (which no CI action can do in a sandbox). See RELEASING.md.
